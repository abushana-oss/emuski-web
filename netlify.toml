[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Use the latest Ubuntu 22.04 (Jammy) build image instead of deprecated Focal
  AWS_LAMBDA_JS_RUNTIME = "nodejs22.x"
  # Force clear build cache
  NETLIFY_CACHE_ID = "v2"

# Use Ubuntu 22.04 (Jammy) build image
[build.processing]
  skip_processing = false

# Next.js specific settings
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect non-www to www for SEO consistency
[[redirects]]
  from = "http://emuski.com/*"
  to = "https://www.emuski.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://emuski.com/*"
  to = "https://www.emuski.com/:splat"
  status = 301
  force = true

# Functions configuration
[functions]
  directory = "netlify/functions"

# Scheduled function for automatic blog refresh (every 5 minutes)
[functions.scheduled-refresh-blogs]
  schedule = "*/5 * * * *"
